<!DOCTYPE html>
<html>
  <title>Bob Whaley's Alaska Canoe Trips</title>
  <link rel="icon" type="image/svg" href="images/BSicon_uCANOEmod.svg">
  <link rel="icon" type="image/png" href="images/BSicon_uCANOEmod.png">
  <style type="text/css">
    #bobwhaley, html, body {
	background-color:gray;
        height: 100%;
	width: 100%;
	margin: 0;
	padding:0;
    }
  </style>
  <head>
    <style type="text/css">
      #bobwhaley {
      }
      .container-video {
	  overflow: hidden;
	  position: fixed;
	  left: 0px;
	  top: 0px;
	  bottom: 0px;
	  right: 0px;
	  z-index:1000;
	  display:block;
	  width: 80%; 
	  margin:0 auto;
      }

      .responsive-video{
	  z-index: 1001;
	  overflow:hidden;
	  padding-bottom:56.25%;
	  position:relative;
	  height:0;
      }

      .responsive-video iframe{
	  z-index: 1002
	  left:0;
	  top:0;
	  height:100%;
	  width:100%;
	  position:absolute;
      }
      
    </style>


  </head>
  
  <body style="background:black">
    <div id="bobwhaley"></div>

    <script src="functions.js"></script>
    <script src="AlaskaData.js"></script>

    <script src="//openseadragon.github.io/openseadragon/openseadragon.min.js"></script>
    
    <script>
      {
	  var imgHTML = "";
	  var id = 0;
	  var overlays = new Array();
	  alaskaData.forEach(function(item) {
	      id += 1;
	      imgHTML += ' <img id="locator' + `${id}` + '" src="' + item.arrow.src + '" alt="' +  item.arrow.alt + '" width="' + item.arrow.width + '">';
	      item.overlay.id='locator' + `${id}`;
	      overlays.push(item.overlay);
	  });

	  document.getElementById("bobwhaley").innerHTML = imgHTML;

	  var viewer = OpenSeadragon({
              id:            'bobwhaley',
              prefixUrl:     '//openseadragon.github.io/openseadragon/images/',
              tileSources:   'Alaska.dz.dzi',
	      overlays: overlays,
	  });

	  id = 0;
	  alaskaData.forEach(function(item) {
	      id += 1;
	      new OpenSeadragon.MouseTracker({element: 'locator' + `${id}`, clickHandler: function(event) {
		  if (item.video) {
		      showDivVideo(item.text, item.video);
		  }
		  else if (item.audio) {
		      showDivAudio(item.text, item.image, item.audio, item.iW, item.iH);
		  }
		  else if (item.txt) {
		      showDivTxt(item.txt);
		  }
		  else {
		      showDiv(item.text, item.image, item.iW, item.iH);
		  }
	  }})});
      }
    </script>
  </body>

</html>
